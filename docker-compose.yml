services:
  fsad:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hun_FSAD
    image: hun_fsad:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Project code (live mount)
      - .:/workspace/FSAD
      # Volume directory
      - /home/hunim/Volume:/workspace
      # Cache for pretrained models (torch.hub, timm, HF)
      - ${CACHE_PATH:-~/.cache}:/root/.cache
    shm_size: "16g"
    stdin_open: true
    tty: true
    working_dir: /workspace/FSAD
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
